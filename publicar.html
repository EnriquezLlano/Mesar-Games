<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesar Games — Publicar producto</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <span class="header-logo"><span>Mesar</span> Games</span>
    <nav>
      <a href="index.html">Catálogo</a>
      <a href="publicar.html">Publicar</a>
    </nav>
  </header>

  <main>
    <div class="formulario-contenedor">
      <h1>Publicar producto</h1>

      <div class="campo">
        <label for="campo-vendedor">Vendedor</label>
        <select id="campo-vendedor" class="select-control">
          <!-- Opciones renderizadas dinámicamente desde ui.js -->
        </select>
      </div>

      <div class="campo">
        <label for="campo-titulo">Título</label>
        <input type="text" id="campo-titulo" placeholder="Nombre del juego" />
        <span class="campo-error" id="error-titulo">El título es obligatorio.</span>
      </div>

      <div class="campo">
        <label for="campo-descripcion">Descripción</label>
        <textarea id="campo-descripcion" placeholder="Descripción del juego..."></textarea>
        <span class="campo-error" id="error-descripcion">La descripción es obligatoria.</span>
      </div>

      <div class="campo-fila">
        <div class="campo">
          <label for="campo-precio">Precio ($)</label>
          <input type="number" id="campo-precio" min="1" placeholder="0" />
          <span class="campo-error" id="error-precio">Ingrese un precio válido mayor a 0.</span>
        </div>
        <div class="campo">
          <label for="campo-stock">Stock</label>
          <input type="number" id="campo-stock" min="1" placeholder="0" />
          <span class="campo-error" id="error-stock">Ingrese un stock válido mayor a 0.</span>
        </div>
      </div>

      <div class="campo">
        <label for="campo-categoria">Categoría</label>
        <select id="campo-categoria">
          <option value="">Seleccionar...</option>
          <option value="Estrategia">Estrategia</option>
          <option value="Familiar">Familiar</option>
          <option value="Cooperativo">Cooperativo</option>
          <option value="RPG">RPG</option>
        </select>
        <span class="campo-error" id="error-categoria">Seleccione una categoría.</span>
      </div>

      <div class="campo-fila">
        <div class="campo">
          <label for="campo-jugadores-min">Jugadores mínimos</label>
          <input type="number" id="campo-jugadores-min" min="1" placeholder="1" />
          <span class="campo-error" id="error-jugadores">El mínimo debe ser menor al máximo.</span>
        </div>
        <div class="campo">
          <label for="campo-jugadores-max">Jugadores máximos</label>
          <input type="number" id="campo-jugadores-max" min="1" placeholder="4" />
        </div>
      </div>

      <div class="campo">
        <label for="campo-edad">Edad mínima</label>
        <input type="number" id="campo-edad" min="0" placeholder="8" />
      </div>

      <div class="campo">
        <label for="campo-imagen">URL de imagen</label>
        <input type="text" id="campo-imagen" placeholder="https://..." />
      </div>

      <button class="btn btn-primario" id="btn-publicar">Publicar producto</button>
    </div>
  </main>

  <footer>
    <p>Mesar Gamer &copy; 2025 — E-commerce de juegos de mesa</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
